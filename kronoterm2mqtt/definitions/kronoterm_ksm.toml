[connection]
baudrate = 115200
bytesize = 8
parity = "N"
stopbits = 1

# KRONOTERM MA_numbering is one-based in documentation and we
# use it here too although internally we substract 1 for all
# register adresses!


# https://developers.home-assistant.io/docs/core/entity/sensor

